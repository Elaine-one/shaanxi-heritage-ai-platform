<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>非遗论坛 - 陕西非物质文化遗产保护平台</title>
    <link rel="stylesheet" href="../css/base/common.css">
    <link rel="stylesheet" href="../css/pages/forum/forum.css?v=2">
    <!-- 新增：统一组件样式 -->
    <link rel="stylesheet" href="../css/components/modal.css">
    <link rel="stylesheet" href="../css/components/notification.css">
    <link rel="stylesheet" href="../css/components/post-editor.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <!-- 富文本编辑器 -->
    <script src="https://cdn.jsdelivr.net/npm/quill@1.3.7/dist/quill.min.js" defer></script>
    <link href="https://cdn.jsdelivr.net/npm/quill@1.3.7/dist/quill.snow.css" rel="stylesheet">
    <!-- API相关脚本 -->
    <script src="../js/utils/utils.js" defer></script>
    <script src="../js/core/api.js" defer></script>
    <!-- 新增：统一组件脚本 -->
    <script src="../js/core/auth-redirect.js" defer></script>
    <script src="../js/components/modal-manager.js" defer></script>
    <script src="../js/components/notification-manager.js" defer></script>
    <script src="../js/components/login-modal.js" defer></script>
    <script src="../js/core/auth.js" defer></script>
    <script src="../js/api/forum-api.js" defer></script>
    <script src="../js/api/user-profile-api.js" defer></script>
</head>
<body>
    <header>
        <div class="logo-container">
            <h1>陕西非物质文化遗产 · 民间文化展示平台</h1>
        </div>
        <div class="header-right">
            <div class="search-icon" aria-label="搜索" role="button" tabindex="0">🔍</div>
            <div class="message-icon" aria-label="消息" role="button" tabindex="0">💬</div>
            <div class="refresh-icon" aria-label="刷新" role="button" tabindex="0">🔄</div>
            <div class="date" id="current-date">加载中...</div>
            <div class="user-icon">👤</div>
        </div>
    </header>
    
    <nav>
        <ul class="main-nav">
            <li><a href="../index.html">首页</a></li>
            <li><a href="policy.html">相关政策</a></li>
            <li><a href="news.html">非遗资讯</a></li>
            <li><a href="non-heritage-list.html">非遗名录</a></li>
            <li><a href="forum.html" class="active">非遗论坛</a></li>
            <li><a href="heritage-map.html">非遗地图</a></li>
            <li><a href="user-creation.html">用户创作</a></li>
            <li><a href="#">传承人风采</a></li>
        </ul>
    </nav>

    <!-- 主要内容 -->
    <main class="main-content">
        <!-- 页面标题 -->
        <section class="page-header">
            <div class="container">
                <h1 class="page-title">
                    <i class="fas fa-comments"></i>
                    非遗论坛
                </h1>
                <p class="page-subtitle">分享交流非物质文化遗产的传承与保护</p>
            </div>
        </section>

        <!-- 论坛主体内容 -->
        <div class="forum-container">
            <!-- 主栏：帖子列表 -->
            <div class="main-column">
                <!-- 功能区 -->
                <div class="forum-controls">
                    <!-- 排序选项卡 -->
                    <div class="sort-tabs">
                        <button class="sort-tab active" data-sort="latest_reply" aria-label="按最新回复排序">最新回复</button>
                        <button class="sort-tab" data-sort="latest_post" aria-label="按最新发布排序">最新发布</button>
                        <button class="sort-tab" data-sort="hot" aria-label="按热度排序">最热</button>
                        <button class="sort-tab" data-sort="featured" aria-label="精华帖子">精华</button>
                    </div>
                    
                    <!-- 筛选和搜索 -->
                    <div class="filter-search">
                        <select class="tag-filter" id="tagFilter" aria-label="选择标签过滤">
                            <option value="">全部标签</option>
                        </select>
                        <div class="search-box">
                            <input type="text" id="searchInput" placeholder="搜索帖子标题或内容...">
                            <button class="search-btn" aria-label="搜索"><i class="fas fa-search"></i></button>
                        </div>
                    </div>
                </div>

                <!-- 发布新帖按钮 -->
                <button class="new-post-btn" id="newPostBtn" aria-label="发布新帖">
                    <i class="fas fa-plus"></i>
                    发布新帖
                </button>

                <!-- 帖子列表 -->
                <div class="post-list" id="postList">
                    <!-- 加载骨架屏 -->
                    <div class="loading-skeleton">
                        <div class="skeleton-post">
                            <div class="skeleton-avatar"></div>
                            <div class="skeleton-content">
                                <div class="skeleton-title"></div>
                                <div class="skeleton-meta"></div>
                                <div class="skeleton-stats"></div>
                            </div>
                        </div>
                        <div class="skeleton-post">
                            <div class="skeleton-avatar"></div>
                            <div class="skeleton-content">
                                <div class="skeleton-title"></div>
                                <div class="skeleton-meta"></div>
                                <div class="skeleton-stats"></div>
                            </div>
                        </div>
                        <div class="skeleton-post">
                            <div class="skeleton-avatar"></div>
                            <div class="skeleton-content">
                                <div class="skeleton-title"></div>
                                <div class="skeleton-meta"></div>
                                <div class="skeleton-stats"></div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 加载更多按钮 -->
                <div class="load-more-container">
                    <button class="load-more-btn" id="loadMoreBtn" aria-label="加载更多帖子">加载更多</button>
                    <div class="pagination-info" id="paginationInfo"></div>
                </div>
            </div>

            <!-- 侧边栏 -->
            <div class="sidebar">
                <!-- 置顶公告区 -->
                <div class="sidebar-section announcements">
                    <h3><i class="fas fa-bullhorn"></i> 置顶公告</h3>
                    <div class="announcement-list" id="announcementList">
                        <!-- 动态加载 -->
                    </div>
                </div>

                <!-- 热门标签云 -->
                <div class="sidebar-section tag-cloud">
                    <h3><i class="fas fa-tags"></i> 热门标签</h3>
                    <div class="tags" id="hotTagsList">
                        <!-- 动态加载 -->
                    </div>
                </div>

                <!-- 本周活跃用户排行榜 -->
                <div class="sidebar-section active-users">
                    <h3><i class="fas fa-trophy"></i> 本周活跃用户</h3>
                    <div class="user-ranking" id="activeUsers">
                        <!-- 动态加载 -->
                    </div>
                </div>

                <!-- 版规摘要 -->
                <div class="sidebar-section forum-rules">
                    <h3><i class="fas fa-gavel"></i> 版规摘要</h3>
                    <div class="rules-content">
                        <ul id="rulesList">
                            <!-- 动态加载 -->
                        </ul>
                        <a href="#" class="view-full-rules">查看社区规范</a>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- 返回顶部按钮 -->
    <button class="back-to-top" id="backToTop" aria-label="返回顶部">
        <i class="fas fa-arrow-up"></i>
    </button>

    <!-- 农历日期转换库 -->
    <script src="../js/lib/LunarSolarConverter.js" defer></script>
    <!-- 日期时间工具模块 -->
    <script src="../js/utils/date-utils.js" defer></script>
    <!-- 帖子发布编辑器组件 -->
    <script src="../js/components/post-editor.js" defer></script>
    <!-- 论坛JavaScript -->
    <script src="../js/pages/forum/forum.js?v=6" defer></script>
</body>
</html>

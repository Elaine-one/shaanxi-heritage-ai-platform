<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>重置密码 - 陕西非物质文化遗产保护平台</title>
    <link rel="stylesheet" href="../css/base/common.css">
    <link rel="stylesheet" href="../css/pages/user/login.css">
</head>
<body>
    <header>
        <div class="logo-container">
            <h1>陕西非物质文化遗产 · 民间文化展示平台</h1>
        </div>
        <div class="header-right">
            <div class="search-icon">🔍</div>
            <div class="message-icon">💬</div>
            <div class="refresh-icon">🔄</div>
            <div class="date" id="current-date">加载中...</div>
            <div class="user-icon">👤</div>
        </div>
    </header>
    
    <nav>
        <ul class="main-nav">
            <li><a href="../index.html">首页</a></li>
            <li><a href="/pages/policy.html">相关政策</a></li>
            <li><a href="/pages/news.html">非遗资讯</a></li>
            <li><a href="non-heritage-list.html">非遗名录</a></li>
            <li><a href="forum.html">非遗论坛</a></li>
            <li><a href="heritage-map.html">非遗地图</a></li>
            <li><a href="user-creation.html">用户创作</a></li>
            <li><a href="#">传承人风采</a></li>
        </ul>
    </nav>
    
    <main class="auth-container">
        <div class="auth-box">
            <div class="auth-header">
                <h2>重置密码</h2>
                <p>请输入您的新密码</p>
            </div>
            
            <form id="reset-password-form" class="auth-form">
                <div class="form-group">
                    <label for="new-password">新密码</label>
                    <input type="password" id="new-password" name="new_password" required>
                    <div class="password-strength" id="password-strength">
                        <div class="strength-bar">
                            <div class="strength-fill" id="strength-fill"></div>
                        </div>
                        <div class="strength-text" id="strength-text">密码强度：弱</div>
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="confirm-password">确认新密码</label>
                    <input type="password" id="confirm-password" name="confirm_password" required>
                    <div class="password-match" id="password-match"></div>
                </div>
                
                <div class="form-group">
                    <button type="submit" class="auth-button">重置密码</button>
                </div>
            </form>
            
            <div class="form-footer">
                <div class="form-footer-links">
                    <a href="login.html">返回登录</a>
                </div>
            </div>
            
            <div id="message" class="message"></div>
        </div>
    </main>
    <script src="../js/lib/LunarSolarConverter.js" defer></script>
    <script src="../js/utils/date-utils.js" defer></script>
    <script src="../js/pages/user/reset-password.js"></script>
</body>
</html>
